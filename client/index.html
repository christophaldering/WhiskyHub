  <body>
    <script>try{var d=JSON.parse(localStorage.getItem('casksense-app')||'{}');if(d.state&&d.state.theme==='light')document.documentElement.classList.add('light');}catch(e){}</script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js', { updateViaCache: 'none' })
            .then(reg => { if (reg.waiting) reg.waiting.postMessage({ type: 'SKIP_WAITING' }); })
            .catch(() => {});
        });
      }
    </script>
  </body>
